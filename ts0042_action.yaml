blueprint:
  name: Zigbee2MQTT TS0042 - Multi Action MQTT
  description: >
    Assign a different action sequence to each TS0042 MQTT action
    published by Zigbee2MQTT.
  domain: automation
  source_url: https://github.com/javierconfoie/ha-z2m-ts0042-blueprint/blob/main/ts0042_action.yaml
  author: Javier
  homeassistant:
    min_version: "2024.10.0"
  input:
    mqtt_topic:
      name: MQTT topic
      description: "Example: zigbee2mqtt/ts0042"
      selector:
        text:

    action_1_single:
      name: Button 1 single press
      description: Action sequence for 1_single
      default: []
      selector:
        action: {}

    action_2_single:
      name: Button 2 single press
      description: Action sequence for 2_single
      default: []
      selector:
        action: {}

    action_1_double:
      name: Button 1 double press
      description: Action sequence for 1_double
      default: []
      selector:
        action: {}

    action_2_double:
      name: Button 2 double press
      description: Action sequence for 2_double
      default: []
      selector:
        action: {}

    action_1_hold:
      name: Button 1 hold
      description: Action sequence for 1_hold
      default: []
      selector:
        action: {}

    action_2_hold:
      name: Button 2 hold
      description: Action sequence for 2_hold
      default: []
      selector:
        action: {}

mode: single

triggers:
  - trigger: mqtt
    topic: !input mqtt_topic

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload_json.action | default('') == '1_single' }}"
        sequence: !input action_1_single

      - conditions:
          - condition: template
            value_template: "{{ trigger.payload_json.action | default('') == '2_single' }}"
        sequence: !input action_2_single

      - conditions:
          - condition: template
            value_template: "{{ trigger.payload_json.action | default('') == '1_double' }}"
        sequence: !input action_1_double

      - conditions:
          - condition: template
            value_template: "{{ trigger.payload_json.action | default('') == '2_double' }}"
        sequence: !input action_2_double

      - conditions:
          - condition: template
            value_template: "{{ trigger.payload_json.action | default('') == '1_hold' }}"
        sequence: !input action_1_hold

      - conditions:
          - condition: template
            value_template: "{{ trigger.payload_json.action | default('') == '2_hold' }}"
        sequence: !input action_2_hold

    default: []
