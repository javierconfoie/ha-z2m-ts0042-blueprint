blueprint:
  name: Zigbee2MQTT TS0042 - Acción MQTT
  description: Ejecuta una secuencia cuando el TS0042 publique la acción seleccionada por MQTT.
  domain: automation
  input:
    mqtt_topic:
      name: Topic MQTT del dispositivo
      description: Ejemplo: zigbee2mqtt/ts0042
      selector:
        text:

    ts0042_action:
      name: Acción del botón
      description: Acción MQTT a escuchar
      selector:
        select:
          options:
            - 1_single
            - 2_single
            - 1_double
            - 2_double
            - 1_hold
            - 2_hold

    action_sequence:
      name: Acciones a ejecutar
      description: Secuencia que se ejecutará cuando coincida la acción seleccionada
      selector:
        action: {}

mode: single

variables:
  expected_action: !input ts0042_action

triggers:
  - trigger: mqtt
    topic: !input mqtt_topic

conditions:
  - condition: template
    value_template: >
      {{ trigger.payload_json is defined and
         (trigger.payload_json.action | default('')) == expected_action }}

actions: !input action_sequence
